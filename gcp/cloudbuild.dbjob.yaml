steps:
  - id: build-dbjob
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.dbjob
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_DBJOB_IMAGE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_DBJOB_IMAGE}:latest
      - .

  - id: push-dbjob
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_DBJOB_IMAGE}

substitutions:
  _REGION: asia-south1
  _ARTIFACT_REPO: kaana
  _DBJOB_IMAGE: faralin-dbjob

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_DBJOB_IMAGE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_DBJOB_IMAGE}:latest

